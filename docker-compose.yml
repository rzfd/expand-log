services:
  migrate:
    image: migrate/migrate:v4.17.1
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}",
        "up"
      ]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    networks:
      - dnsnet
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT}:8080"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    depends_on:
      # postgres:
      #   condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      dnsnet:
        ipv4_address: 172.28.0.24
      
networks:
  dnsnet:
    name: dnsgw_dnsnet
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  pgadmin_data:
